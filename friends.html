<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الرباعي الأسطوري 💀</title>

<style>
body {
    font-family: Arial;
    background: black;
    color: white;
    text-align: center;
}

.container {
    max-width: 500px;
    margin: auto;
    margin-top: 80px;
}

button {
    padding: 10px 20px;
    margin-top: 15px;
    background: white;
    color: black;
    border: none;
    border-radius: 10px;
}

input {
    padding: 10px;
    width: 80%;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
}

.confetti {
    font-size: 30px;
    animation: fall 1s infinite;
}

@keyframes fall {
    0% {transform: translateY(-10px);}
    100% {transform: translateY(10px);}
}
</style>
</head>

<body>

<div class="container" id="start">
<h2>حياكم حياكم في موقع الرباعي الأسطوري 💀</h2>
<p>بنشوفكم اذا تعرفوا بعض زين ولا لا 😏</p>
<button onclick="startGame()">ابدأ الاختبار</button>
</div>

<div class="container" id="game" style="display:none;">
<h2 id="question"></h2>
<input type="text" id="answer" placeholder="اكتب الجواب">
<br>
<button onclick="check()">تحقق</button>
<p id="result"></p>
</div>

<script>
const questions = [
{q:"وش اسم قروبنا؟",a:["الرباعي الاسطوري"]},

{q:"من اكثر 2 يتضاربوا مع بعض؟",a:["فيصل و حاتم","حاتم و فيصل"]},

{q:"من أكثر واحد يسأل أسئلة غبية؟",a:["حاتم"]},

{q:"من هو صاحب الفكرة الاسطورية خزينة الدولة؟",a:["راشد"]},

{q:"من أكثر واحد يخسر فلوسه على أشياء مالها داعي؟",a:["راشد","حاتم"]},

{q:"من هو صاحب الجملة اوبن اوبن شباب؟",a:["حاتم"]},

{q:"من اللي يشجع أسوأ فريق في العالم؟",a:["فيصل"]},

{q:"أسرع سيارة في العالم؟",a:["الماليبو","ماليبو"]},

{q:"من صاحب جملة بطّل بطّل نت؟",a:["راشد"]},

{q:"من أكثر واحد ما يرد على الاتصالات؟",a:["حاتم"]}
];

let current = 0;
let laugh = new Audio("https://www.myinstants.com/media/sounds/laugh.mp3");

function startGame(){
document.getElementById("start").style.display="none";
document.getElementById("game").style.display="block";
load();
}

function load(){
document.getElementById("question").innerText = questions[current].q;
document.getElementById("answer").value="";
document.getElementById("result").innerText="";
}

function check(){
let ans = document.getElementById("answer").value.toLowerCase().trim();

if(questions[current].a.includes(ans)){
current++;
if(current < questions.length){
load();
}else{
document.body.innerHTML = `
<h1>🎉 هيييييووووااا هنيه يوم تبا ربع 😂🔥</h1>
<div class="confetti">🎉🎉🎉🎉🎉🎉</div>
`;
}
}else{
laugh.play();
document.getElementById("result").innerText = "❌ لا يا الكبش 🤣";
}
}
</script>

</body>
</html>
