<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Garage System</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  margin: 0;
}

h1 {
  text-align: center;
  padding: 20px;
  background: #444;
  color: white;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
  padding: 20px;
}

.car {
  background: white;
  padding: 15px;
  border-radius: 10px;
}

input {
  width: 100%;
  margin: 5px 0;
  padding: 8px;
}

button {
  margin-top: 10px;
  padding: 8px;
  width: 48%;
  border: none;
  background: #444;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #666;
}
</style>
</head>

<body>

<h1>Garage System 🚗</h1>

<div class="container" id="cars"></div>

<script>
const carNames = [
"BMW 430",
"BMW 520",
"BMW X5",
"Tahoe",
"Malibu"
];

function loadCars() {
  const container = document.getElementById("cars");
  container.innerHTML = "";

  carNames.forEach((name, i) => {
    const data = JSON.parse(localStorage.getItem(name)) || {};

    container.innerHTML += `
      <div class="car">
        <h3>${name}</h3>

        <input placeholder="Fuel (OMR)" value="${data.fuel || ''}" id="fuel${i}">
        <input placeholder="Current KM" value="${data.km || ''}" id="km${i}">
        <input placeholder="Last Service KM" value="${data.service || ''}" id="service${i}">
        <input placeholder="Last Oil Change KM" value="${data.oil || ''}" id="oil${i}">
        <input placeholder="Issues" value="${data.issues || ''}" id="issues${i}">

        <button onclick="save(${i})">Save</button>
        <button onclick="resetCar(${i})">Reset</button>
      </div>
    `;
  });
}

function save(i) {
  const name = carNames[i];

  const data = {
    fuel: document.getElementById("fuel"+i).value,
    km: document.getElementById("km"+i).value,
    service: document.getElementById("service"+i).value,
    oil: document.getElementById("oil"+i).value,
    issues: document.getElementById("issues"+i).value
  };

  localStorage.setItem(name, JSON.stringify(data));
  alert("Saved ✅");
}

function resetCar(i) {
  const name = carNames[i];
  localStorage.removeItem(name);
  loadCars();
}

loadCars();
</script>

</body>
</html>
